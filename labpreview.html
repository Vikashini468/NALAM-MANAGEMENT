<!DOCTYPE html>
<html>
<head>
    <title>Lab Preview</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        .topbar{
            height:60px;
            background:#fff;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 30px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .logo{
            color:#1565c0;
            font-size:22px;
            font-weight:bold;
        }

        .user{
            color:#1565c0;
            font-weight:bold;
        }

        .container{
            padding:30px;
        }

        .paper{
            max-width:750px;
            margin:auto;
            background:#fff;
            border-radius:15px;
            padding:35px;
            box-shadow:0 2px 15px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#1565c0;
            margin-bottom:20px;
        }

        hr{
            margin:20px 0;
            border:none;
            border-top:1px solid #ddd;
        }

        .info-card{
            background:#eef5ff;
            padding:18px;
            border-radius:10px;
            margin-bottom:25px;
        }

        .info-card p{
            margin:10px 0;
        }

        .test-title{
            color:#1565c0;
            margin-bottom:15px;
        }

        .test{
            background:#f8fbff;
            border:1px solid #cfe2ff;
            padding:12px;
            border-radius:8px;
            margin-bottom:10px;
        }

        .button-row{
            display:flex;
            gap:15px;
            margin-top:30px;
        }

        button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            color:white;
            cursor:pointer;
            font-size:15px;
        }

        .edit{
            background:#ff9800;
        }

        .confirm{
            background:#1565c0;
        }

        button:hover{
            opacity:.9;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div class="logo">NALAM AI - Lab</div>
    <div class="user">Lab Technician</div>
</div>

<div class="container">

<div class="paper">

<h2>LAB TEST REQUEST</h2>

<hr>

<div class="info-card">

<p><b>Doctor :</b> <span id="doctor">-</span></p>

<p><b>Patient ID :</b> <span id="patient">-</span></p>

<p><b>Appointment ID :</b> <span id="appointment">-</span></p>

</div>

<h3 class="test-title">Requested Tests</h3>

<div id="tests"></div>

<div class="button-row">

<button class="edit" onclick="editReport()">
Edit
</button>

<button class="confirm" onclick="confirmReport()">
Confirm
</button>

</div>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const doctorId=params.get("doctorId");
const patientId=params.get("patientId");
const appointmentId=params.get("appointmentId");

const doctorName=localStorage.getItem("doctorName") || "Doctor";

const tests=JSON.parse(localStorage.getItem("selectedTests")) || [];

document.getElementById("doctor").textContent=doctorName;
document.getElementById("patient").textContent=patientId || "-";
document.getElementById("appointment").textContent=appointmentId || "-";

const testDiv=document.getElementById("tests");

if(tests.length===0){

    testDiv.innerHTML="<p>No tests selected.</p>";

}else{

    let html="";

    tests.forEach(test=>{

        html+=`
            <div class="test">
                ✔ ${test}
            </div>
        `;

    });

    testDiv.innerHTML=html;

}

function editReport(){

    window.history.back();

}

async function confirmReport(){

    try{

        const report={

            doctorId,
            patientId,
            appointmentId,
            tests,
            date:new Date()

        };

        const res=await fetch("/lab/request",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(report)

        });

        const result=await res.json();

        if(result.success){

            alert("Lab request sent successfully.");

            localStorage.removeItem("selectedTests");

            window.location.href=`doctor.html?id=${doctorId}`;

        }else{

            alert(result.message || "Failed to send request.");

        }

    }

    catch(err){

        console.error(err);

        alert("Server Error");

    }

}

</script>

</body>
</html>
