<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NALAM AI Registration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#f4f6f9}
.topbar{height:60px;background:#1a4fa3;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:1000}
.logo{font-size:20px;font-weight:600}
.sidebar{position:fixed;top:60px;left:0;width:70px;height:100%;background:#fff;border-right:1px solid #ddd;display:flex;justify-content:center;padding-top:20px}
.main{margin-left:70px;margin-top:60px;padding:20px}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.05);margin-bottom:20px}
.card-header{background:#1a4fa3;color:#fff;padding:12px;border-radius:8px 8px 0 0}
.card-body{padding:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:15px}
input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px}
label{display:block;margin-bottom:5px;font-weight:500}
.footer{text-align:right;margin-top:15px}
.btn{background:#e67e22;color:#fff;padding:12px 25px;border:none;border-radius:5px;cursor:pointer}
.hidden{display:none}
.step-card{display:none}
.step-card.active{display:block}
.exp-card{border:1px solid #ddd;padding:15px;margin-top:15px;border-radius:8px;background:#fafafa}
.secondary-btn{padding:10px 18px;border:none;border-radius:5px;cursor:pointer;background:#ccc;margin-right:10px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar"><div class="logo">NALAM AI</div></div>
<div class="sidebar">☰</div>

<div class="main">
<form method="POST" enctype="multipart/form-data" action="/register">

<div class="step-card active" id="step1">

<div class="card">
<div class="card-header">Role Selection</div>
<div class="card-body">
<select id="role" name="role" required>
<option value="">Select Role</option>
<option value="patient">Patient</option>
<option value="doctor">Doctor</option>
<option value="nurse">Nurse</option>
<option value="lab">Lab</option>
<option value="pharmacy">Pharmacy</option>
</select>
</div>
</div>

<div class="card">
<div class="card-header">Basic Details</div>
<div class="card-body">
<div class="grid">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
</div>
<div class="grid">
<input type="password" name="password" placeholder="Password" required>
<input type="date" name="dob">
</div>
<div class="grid">
<input type="number" name="age" placeholder="Age">
<select name="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Transgender</option>
<option>Prefer not to say</option>
</select>
</div>
<input type="text" name="address" placeholder="Address">
<div class="footer">
<button type="button" class="btn" onclick="nextStep()">Save & Next</button>
</div>
</div>
</div>

</div>

<div class="step-card" id="step2">
<div class="card">
<div class="card-header">Role Specific Details</div>
<div class="card-body">

<div id="patient" class="hidden">
<label>Upload Photograph</label>
<input type="file" name="patientPhoto">
<div class="grid">
<input type="text" name="bloodGroup" placeholder="Blood Group">
<input type="number" name="weight" placeholder="Weight">
</div>
</div>

<div id="doctor" class="hidden">
<label>Upload Photograph</label>
<input
    type="file"
    name="doctorPhoto"
    accept="image/*">

<div class="grid">
<input type="text" name="degree" placeholder="Degree">
<input type="text" name="college" placeholder="College">
</div>
<label>Upload Degree PDF</label>
<input
    type="file"
    name="doctorDegree"
    accept=".pdf,application/pdf">
<div class="grid">
<input type="text" name="medicalNumber" placeholder="Medical Council Number">
<input type="text" name="specialisation" placeholder="Specialisation">
</div>
</div>

<div id="nurse" class="hidden">
<input type="file" name="nursePhoto">
<div class="grid">
<input type="text" name="nurseQualification" placeholder="Qualification">
<input type="text" name="nurseCollege" placeholder="College">
</div>
</div>

<div id="lab" class="hidden">
<input type="file" name="labPhoto">
<input type="text" name="labQualification" placeholder="Qualification">
</div>

<div id="pharmacy" class="hidden">
<input type="file" name="pharmacyPhoto">
<div class="grid">
<input type="text" name="pharmacyQualification" placeholder="Qualification">
<input type="text" name="licenseNumber" placeholder="License Number">
</div>
</div>

<div class="footer">
<button type="button" class="secondary-btn" onclick="showStep(1)">Back</button>
<button type="button" class="btn" onclick="nextRoleStep()">Next</button>
</div>

</div>
</div>
</div>

<div class="step-card" id="step3">
<div class="card">
<div class="card-header">Experience Details</div>
<div class="card-body">
<div id="experienceList"></div>
<button type="button" class="btn" onclick="addExperience()">+ Add Experience</button>
<div class="footer">
<button type="button" class="secondary-btn" onclick="showStep(2)">Back</button>
<button type="submit" class="btn">Submit</button>
</div>
</div>
</div>
</div>

</form>
</div>

<script>
let expCount=0;

function showStep(step){
document.querySelectorAll('.step-card').forEach(s=>s.classList.remove('active'));
document.getElementById('step'+step).classList.add('active');
}

function nextStep(){
const role=document.getElementById('role').value;
if(!role){alert('Please select a role');return;}
['patient','doctor','nurse','lab','pharmacy'].forEach(id=>{
document.getElementById(id).classList.add('hidden');
});
document.getElementById(role).classList.remove('hidden');
showStep(2);
}

function nextRoleStep(){
const role=document.getElementById('role').value;
if(['doctor','nurse','lab','pharmacy'].includes(role)){
showStep(3);
}else{
document.forms[0].submit();
}
}

function addExperience(){
expCount++;
const div=document.createElement('div');
div.className='exp-card';
div.innerHTML=`
<h4>Experience ${expCount}</h4>
<div class="grid">
<input type="text" name="hospitalName[]" placeholder="Hospital Name">
<input type="text" name="department[]" placeholder="Department">
</div>
<div class="grid">
<input type="number" name="yearsExperience[]" placeholder="Years">
<input type="date" name="startDate[]">
</div>
<div class="grid">
<input type="date" name="endDate[]">
</div>
<button type="button" onclick="this.parentElement.remove()">Remove</button>`;
document.getElementById('experienceList').appendChild(div);
}
</script>

</body>
</html>
