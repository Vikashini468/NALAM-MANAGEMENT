<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Emergency Queue</title>

    <link rel="stylesheet" href="emergencyQueue.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>🚑 Emergency Queue</h1>

        <button onclick="loadQueue()">
            Refresh
        </button>

    </div>

    <div class="legend">

        <span class="critical">🔴 Critical</span>

        <span class="veryurgent">🟠 Very Urgent</span>

        <span class="urgent">🟡 Urgent</span>

        <span class="low">🟢 Less Urgent</span>

    </div>

    <div id="queue">

        <!-- Queue will load here -->

    </div>

</div>

<script src="emergencyQueue.js"></script>

</body>

</html>
