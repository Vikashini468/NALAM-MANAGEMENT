<!DOCTYPE html>
<html>
<head>
  <title>Lab Dashboard</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      display: flex;
      background: #f4f7fb;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #0d47a1;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .nav-item {
      padding: 10px;
      margin: 8px 0;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.25);
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      background: white;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .profile {
      color: #0d47a1;
      font-weight: bold;
    }

    /* CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      color: #0d47a1;
      margin-bottom: 8px;
    }

    .btn {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1565c0;
      color: white;
    }

    .btn:hover {
      background: #0d47a1;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      width: 500px;
      border-radius: 12px;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }

    .upload {
      margin-top: 15px;
    }

    input[type="file"] {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Lab Panel</h2>
  <div class="nav-item">Test Requests</div>
  <div class="nav-item">Completed Reports</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <input placeholder="Search patient">
    <div class="profile">Lab Technician</div>
  </div>

  <h2 style="margin-bottom:15px;">Pending Lab Requests</h2>

  <div id="labGrid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">&times;</span>

    <h3 id="mPatient">Patient</h3>
    <p id="mDoctor"></p>
    <p id="mTests"></p>

    <hr style="margin:15px 0;">

    <h4>Upload Report (PDF)</h4>

    <input type="file" id="reportFile">

    <button class="btn" onclick="uploadReport()">Upload</button>

  </div>
</div>

<script>
  let currentRequestId = null;

/* =========================
   LOAD LAB REQUESTS
========================= */

async function loadLabRequests() {
    try {
        const res = await fetch("/lab/requests");
        const data = await res.json();

        const grid = document.getElementById("labGrid");
        grid.innerHTML = "";

        if (!data || data.length === 0) {
            grid.innerHTML = "<p>No lab requests found.</p>";
            return;
        }

        data.forEach(req => {

    let tests = [];

    try {
        tests = typeof req.tests === "string"
            ? JSON.parse(req.tests)
            : req.tests;
    } catch (e) {
        tests = [];
    }

    grid.innerHTML += `
        <div class="card">
            <h3>${req.patient_name || "Unknown Patient"}</h3>
            <p><b>Doctor:</b> ${req.doctor_name || "-"}</p>
            <p><b>Tests:</b> ${tests.join(", ")}</p>

            <button class="btn"
                data-id="${req.id}"
                data-patient="${req.patient_name || ''}"
                data-doctor="${req.doctor_name || ''}"
                data-tests='${JSON.stringify(tests)}'
                onclick="openRequest(this)">
                View
            </button>
        </div>
    `;
});
    } catch (err) {
        console.error("Error loading requests:", err);
    }
}

/* =========================
   OPEN REQUEST MODAL
========================= */

function openRequest(btn) {

    const id = btn.dataset.id;
    const patient = btn.dataset.patient;
    const doctor = btn.dataset.doctor;
    const tests = JSON.parse(btn.dataset.tests || "[]");

    currentRequestId = id;

    document.getElementById("mPatient").innerText =
        "Patient: " + patient;

    document.getElementById("mDoctor").innerText =
        "Doctor: " + doctor;

    document.getElementById("mTests").innerHTML =
        "<b>Tests:</b><br>" +
        tests.map(t => "✔ " + t).join("<br>");

    document.getElementById("modal").style.display = "flex";
}

/* =========================
   CLOSE MODAL
========================= */

function closeModal() {
    document.getElementById("modal").style.display = "none";
    currentRequestId = null;
}

/* =========================
   UPLOAD REPORT (PDF)
========================= */

async function uploadReport() {

    const fileInput = document.getElementById("reportFile");

    if (!fileInput.files[0]) {
        alert("Please select a PDF file");
        return;
    }

    const formData = new FormData();
    formData.append("report", fileInput.files[0]);

    try {
        const res = await fetch(`/lab/upload/${currentRequestId}`, {
            method: "POST",
            body: formData
        });

        const result = await res.json();

        if (result.success) {
            alert("Report uploaded successfully");
            closeModal();
            loadLabRequests();
        } else {
            alert(result.message || "Upload failed");
        }

    } catch (err) {
        console.error(err);
        alert("Server error while uploading");
    }
}

/* =========================
   INIT
========================= */

window.onload = function () {
    loadLabRequests();
};
</script>

</body>
</html>
