<!DOCTYPE html>
<html>
<head>
  <title>Pharmacy Dashboard</title>
  <link rel="stylesheet" href="style1.css">

  <style>
    .section { display: none; }
    .section.active { display: block; }
    .stock-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.stock-table th {
  background: #1565c0;
  color: white;
  padding: 12px;
  text-align: left;
}

.stock-table td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.stock-table tr:hover {
  background: #f4f8ff;
}
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Pharmacy</h2>

  <div class="nav-item active" onclick="showSection('stock'); loadStock();">
    Stock
  </div>

  <div class="nav-item" onclick="showSection('prescriptions'); loadPrescriptions();">
    Prescriptions
  </div>

  <div class="nav-item">
    Orders
  </div>
</div>

<div class="main">

  <div class="topbar">
    <input placeholder="Search medicine">
    <div class="profile">Pharmacy</div>
  </div>

  <!-- STOCK SECTION -->
  <div id="stock" class="section active">
  <div class="panel">
    <h3>Medicine Stock</h3>

    <table class="stock-table">
      <thead>
        <tr>
          <th>Medicine Name</th>
          <th>Price (₹)</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody id="stockList"></tbody>
    </table>

  </div>
</div>
  <!-- PRESCRIPTIONS SECTION -->
  <div id="prescriptions" class="section">
    <div class="panel">
      <h3>Patient Prescriptions</h3>
      <div id="prescriptionList"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>

<script>
function showSection(id) {

  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

/* ================= STOCK ================= */
async function loadStock() {
  try {
    const res = await fetch("/medicines");
    const data = await res.json();

    const tbody = document.getElementById("stockList");
    tbody.innerHTML = "";

    data.forEach(m => {
      tbody.innerHTML += `
        <tr>
          <td>${m.name}</td>
          <td>₹${m.price || 0}</td>
          <td>${m.stock_quantity}</td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

/* ================= PRESCRIPTIONS ================= */
async function loadPrescriptions() {

  try {

    const res = await fetch("/pharmacy/prescriptions");
    const data = await res.json();

    const list = document.getElementById("prescriptionList");
    list.innerHTML = "";

    if (!data || data.length === 0) {
      list.innerHTML = "<p>No prescriptions found</p>";
      return;
    }

    data.forEach(p => {

    const total = p.total_amount || (p.quantity * p.price);

    list.innerHTML += `
        <div class="card">

            <h3>Patient: ${p.patient_name || "-"}</h3>

            <p><b>Doctor:</b> ${p.doctor_name || "-"}</p>

            <p><b>Medicine:</b> ${p.medicine_name || "-"}</p>

            <p><b>Price:</b> ₹${p.price || 0}</p>

            <p><b>Quantity:</b> ${p.quantity || 0}</p>

            <p><b>Days:</b> ${p.duration || "-"}</p>

            <p><b>Total:</b> ₹${total}</p>
            <button onclick="completePrescription(${p.prescription_id})">
    Mark Completed
</button>

        </div>
    `;
});

  } catch (err) {
    console.error("Prescription load error:", err);
  }
}
async function completePrescription(id) {

    const res = await fetch(`/pharmacy/complete-prescription/${id}`, {
        method: "POST"
    });

    const data = await res.json();

    if (data.success) {
        alert("Prescription completed & stock updated");
        loadPrescriptions();
        loadStock(); // refresh UI
    } else {
        alert("Failed to complete prescription");
    }
}
/* Load default */
window.onload = function () {
  loadStock();
};
</script>

</body>
</html>
